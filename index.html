<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strive-Ops | Next-Gen Operations Intelligence</title>
    
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js" crossorigin="anonymous"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --ops-blue: #3b82f6; --ops-bg: #020617; }
        body { background-color: var(--ops-bg); color: #f8fafc; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .ops-glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); border-radius: 1rem; }
        
        /* Branding Styles */
        .logo-font { letter-spacing: -0.05em; font-style: italic; }
        .rec-indicator { width: 10px; height: 10px; background: #ef4444; border-radius: 50%; animation: pulse-red 1.5s infinite; }
        @keyframes pulse-red { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* Video Feed Fixes */
        video { width: 100%; border-radius: 0.75rem; background: #000; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        #local-video { transform: scaleX(-1); border: 1px solid #1e293b; }
        
        /* Collaborative Pointer */
        #pointer-layer { pointer-events: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 50; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="p-4 lg:p-8">

    <div class="max-w-7xl mx-auto space-y-6">
        
        <header class="flex flex-col lg:flex-row justify-between items-center gap-6 ops-glass p-8 shadow-2xl">
            <div class="flex items-center gap-4">
                <div class="h-14 w-14 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg transform -rotate-3">
                    <span class="text-white font-black text-2xl tracking-tighter">SO</span>
                </div>
                <div>
                    <h1 class="text-3xl font-black logo-font uppercase tracking-tighter">STRIVE<span class="text-blue-500">-OPS</span></h1>
                    <div class="flex items-center gap-2 mt-1">
                        <div class="rec-indicator"></div>
                        <p class="text-[9px] text-gray-400 font-bold tracking-[0.25em] uppercase">Operations Intelligence Active</p>
                    </div>
                </div>
            </div>

            <div class="flex flex-col items-end gap-3 w-full lg:w-auto">
                <div class="text-right">
                    <p class="text-[9px] text-gray-500 font-mono tracking-widest uppercase">Encrypted Node</p>
                    <span id="my-id" class="text-blue-400 font-bold text-xs uppercase">Connecting...</span>
                </div>
                <div class="flex gap-2 w-full lg:w-auto">
                    <input type="text" id="remote-id" placeholder="Remote Expert ID" 
                        class="bg-black bg-opacity-40 border border-gray-800 rounded-lg px-4 py-3 text-xs focus:ring-1 focus:ring-blue-500 outline-none w-full lg:w-48 text-gray-300">
                    <button onclick="startCall()" class="bg-blue-600 hover:bg-blue-500 px-6 py-3 rounded-lg font-black text-[10px] uppercase transition shadow-lg tracking-widest">Connect</button>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <div class="lg:col-span-3 space-y-6">
                <div class="ops-glass p-6">
                    <h3 class="text-[10px] font-black text-blue-500 uppercase tracking-[0.2em] mb-4">Experts in Session</h3>
                    <div id="member-list" class="space-y-2">
                        <div class="text-[10px] text-gray-600 italic">Syncing node...</div>
                    </div>
                    <button onclick="copyInvite()" class="w-full mt-6 bg-gray-900 border border-gray-800 text-[9px] font-black text-blue-300 py-3 rounded-lg hover:bg-gray-800 transition tracking-widest uppercase">Copy Invite Link</button>
                </div>

                <div class="ops-glass p-6">
                    <h3 class="text-[10px] font-black text-blue-500 uppercase tracking-[0.2em] mb-4">Privacy Engine</h3>
                    <div class="grid grid-cols-2 gap-2">
                        <button id="btn-none" onclick="setBgMode('none')" class="bg-gray-800 p-2 rounded text-[9px] font-bold uppercase transition hover:bg-gray-700">None</button>
                        <button id="btn-blur" onclick="setBgMode('blur')" class="bg-gray-800 p-2 rounded text-[9px] font-bold uppercase transition hover:bg-gray-700">Blur</button>
                        <button id="btn-color" onclick="setBgMode('color')" class="bg-gray-800 p-2 rounded text-[9px] font-bold uppercase transition hover:bg-gray-700">Ops Blue</button>
                        <button id="btn-image" onclick="document.getElementById('bg-upload').click()" class="bg-blue-900 bg-opacity-40 p-2 rounded text-[9px] font-bold uppercase transition hover:bg-blue-800">Custom</button>
                    </div>
                    <input type="file" id="bg-upload" accept="image/*" class="hidden" onchange="loadCustomBackground(event)">
                </div>
            </div>

            <div class="lg:col-span-6 space-y-6">
                <div class="relative group">
                    <video id="local-video" autoplay muted playsinline></video>
                    <div class="absolute bottom-6 left-1/2 transform -translate-x-1/2 flex gap-3 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button onclick="toggleMic()" class="bg-gray-900 p-4 rounded-xl hover:bg-blue-600 transition shadow-2xl">🎤</button>
                        <button onclick="toggleCam()" class="bg-gray-900 p-4 rounded-xl hover:bg-blue-600 transition shadow-2xl">📷</button>
                        <button onclick="toggleScreenShare()" id="btn-share" class="bg-blue-600 px-6 py-4 rounded-xl font-black text-[10px] uppercase shadow-2xl tracking-widest">Share Workspace</button>
                    </div>
                </div>

                <div class="relative" id="remote-container">
                    <video id="remote-video" autoplay playsinline class="rounded-xl border border-gray-900"></video>
                    <canvas id="pointer-layer"></canvas>
                    <div class="absolute top-4 left-4 bg-gray-900 bg-opacity-70 px-3 py-1 rounded text-[8px] font-black tracking-widest border border-gray-800">REMOTE_EXPERT_STREAM</div>
                </div>
            </div>

            <div class="lg:col-span-3">
                <div class="ops-glass flex flex-col h-full overflow-hidden shadow-2xl">
                    <div class="p-5 border-b border-gray-800 flex justify-between items-center bg-gray-900 bg-opacity-50">
                        <h3 class="font-black text-[10px] text-blue-400 tracking-widest uppercase">Gemini Intel Log</h3>
                        <div id="ai-status" class="w-2 h-2 rounded-full bg-gray-600"></div>
                    </div>
                    
                    <div id="transcript-box" class="flex-grow p-5 overflow-y-auto h-[480px] space-y-4 text-[11px] leading-relaxed">
                        <p class="text-center text-gray-700 font-bold mt-20 opacity-40 uppercase tracking-tighter">Awaiting Audio Feed...</p>
                    </div>

                    <div class="p-5 bg-gray-900 bg-opacity-30">
                        <button id="trans-btn" onclick="startTranscription()" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-black text-[10px] uppercase tracking-[0.2em] transition transform active:scale-95 shadow-xl">Activate AI Analytics</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        function copyInvite() {
            const id = document.getElementById('my-id').innerText;
            if(id === "Connecting...") return;
            const link = `${window.location.origin}${window.location.pathname}?join=${id}`;
            navigator.clipboard.writeText(link).then(() => alert("Strive-Ops Invite Link Copied."));
        }
    </script>
</body>
</html>
