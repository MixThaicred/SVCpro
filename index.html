<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Strive-Ops Live Coaching</title>
  <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <style>
    :root {
      --bg: #0b1120;
      --card: #131c31;
      --line: #23304d;
      --text: #f8fafc;
      --muted: #94a3b8;
      --blue: #2563eb;
      --green: #16a34a;
      --red: #dc2626;
      --gray: #334155;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 20px;
    }

    .wrap {
      max-width: 1000px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 8px;
    }

    .sub {
      color: var(--muted);
      margin-bottom: 20px;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .grow {
      flex: 1 1 240px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #0a1020;
      color: var(--text);
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 12px 16px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-blue { background: var(--blue); }
    .btn-green { background: var(--green); }
    .btn-red { background: var(--red); }
    .btn-gray { background: var(--gray); }

    .id-box {
      color: #60a5fa;
      font-weight: bold;
      word-break: break-all;
    }

    .videos {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .video-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
    }

    .video-title {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    video {
      width: 100%;
      min-height: 260px;
      background: black;
      border-radius: 12px;
      object-fit: cover;
    }

    #local-video {
      transform: scaleX(-1);
    }

    .placeholder {
      min-height: 260px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: black;
      border-radius: 12px;
      color: var(--muted);
      text-align: center;
      padding: 20px;
    }

    #tap-play {
      display: none;
      width: 100%;
      margin-top: 10px;
    }

    #status {
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 820px) {
      .videos {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Strive-Ops Live Coaching</h1>
    <div class="sub">Fresh rebuild. Host broadcasts. Viewer watches.</div>

    <div class="panel">
      <div style="margin-bottom: 8px;">Your Session ID</div>
      <div id="my-id" class="id-box">Connecting...</div>
    </div>

    <div class="panel">
      <div class="row">
        <button id="host-btn" class="btn-green">Become Host</button>
        <button id="viewer-btn" class="btn-gray">Join as Viewer</button>
        <button id="copy-btn" class="btn-blue">Copy My ID</button>
      </div>
    </div>

    <div class="panel">
      <div class="row">
        <div class="grow">
          <input id="host-id-input" placeholder="Paste Host ID here" />
        </div>
        <button id="join-btn" class="btn-blue">Join Host</button>
        <button id="hangup-btn" class="btn-red">Hang Up</button>
      </div>
    </div>

    <div class="panel">
      <div id="status">Ready.</div>
    </div>

    <div class="videos">
      <div class="video-card">
        <div class="video-title">My Camera</div>
        <video id="local-video" autoplay muted playsinline style="display:none;"></video>
        <div id="local-placeholder" class="placeholder">Your camera is off.</div>
      </div>

      <div class="video-card">
        <div class="video-title">Live Coaching Feed</div>
        <video id="remote-video" autoplay playsinline style="display:none;"></video>
        <div id="remote-placeholder" class="placeholder">Waiting for live feed.</div>
        <button id="tap-play" class="btn-blue">Tap to Start Video</button>
      </div>
    </div>
  </div>

  <script src="app.js?v=1"></script>
</body>
</html>
