<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strive-Ops</title>

    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        body { background: #020617; color: white; }
        video { width: 100%; border-radius: 10px; background: black; }
        #local-video { transform: scaleX(-1); }
    </style>
</head>

<body class="p-6">

    <h1 class="text-xl mb-4">Strive-Ops Coaching</h1>

    <div class="flex gap-4 mb-4">
        <span id="my-id">Connecting...</span>
        <input id="remote-id" placeholder="Remote ID" class="text-black px-2">
        <button onclick="startCall()" class="bg-blue-600 px-4">Connect</button>
    </div>

    <div class="grid grid-cols-2 gap-4">
        <video id="local-video" autoplay muted playsinline></video>
        <video id="remote-video" autoplay playsinline></video>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>

</body>
</html>
