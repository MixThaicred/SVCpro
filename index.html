<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strive-Ops | Operations Command Center</title>
    
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js" crossorigin="anonymous"></script>

    <style>
        :root { --ops-blue: #3b82f6; --ops-bg: #020617; }
        body { background-color: var(--ops-bg); color: #f8fafc; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
        .ops-glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        
        /* Video Grid Logic */
        #video-grid { display: grid; gap: 1rem; padding: 1rem; height: 100%; width: 100%; transition: all 0.3s ease; }
        .video-container { position: relative; border-radius: 1rem; overflow: hidden; background: #000; border: 1px solid #1e293b; }
        .video-container.host { border: 2px solid var(--ops-blue); box-shadow: 0 0 20px rgba(59, 130, 246, 0.2); }
        video { width: 100%; height: 100%; object-fit: cover; image-rendering: -webkit-optimize-contrast; }
        #local-video { transform: scaleX(-1); }

        /* Boot Screen Overlays */
        #boot-screen { position: fixed; inset: 0; z-index: 1000; background: #020617; display: flex; flex-direction: column; items: center; justify-content: center; transition: opacity 0.5s ease; }
        .control-dock { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); z-index: 100; display: flex; gap: 1rem; padding: 0.75rem 1.5rem; border-radius: 1.5rem; border: 1px solid rgba(255,255,255,0.1); }
        
        .rec-dot { width: 8px; height: 8px; background: #ef4444; border-radius: 50%; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        
        /* Scrollbars */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <div id="boot-screen">
        <div class="h-16 w-16 bg-blue-600 rounded-2xl flex items-center justify-center mb-6 shadow-2xl">
            <span class="text-white font-black text-2xl">SO</span>
        </div>
        <h1 class="text-2xl font-black italic tracking-tighter uppercase mb-2 text-white">Strive-Ops</h1>
        <button id="launch-btn" onclick="bootSystem()" class="bg-blue-600 px-12 py-5 rounded-2xl font-black text-lg uppercase shadow-xl hover:bg-blue-500 transition transform active:scale-95">Launch Node</button>
        <p id="boot-status" class="text-[9px] text-gray-500 uppercase tracking-[0.3em] mt-6 font-bold">System Standby</p>
    </div>

    <header class="flex justify-between items-center px-8 py-4 ops-glass border-b border-gray-800">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-black italic tracking-tighter uppercase">STRIVE<span class="text-blue-500">-OPS</span></h1>
            <div class="flex items-center gap-2"><div class="rec-dot"></div><p id="my-id" class="text-[10px] font-mono text-gray-500 font-bold uppercase tracking-widest tracking-tighter">NODE: OFFLINE</p></div>
        </div>
        <div class="flex gap-4">
            <div class="flex bg-black bg-opacity-40 border border-gray-800 rounded-lg px-2 items-center">
                <input type="text" id="remote-id" placeholder="EXPERT ID" class="bg-transparent text-[10px] outline-none px-2 w-32 py-2">
                <button onclick="startCall()" class="bg-blue-600 text-[9px] font-black uppercase px-4 py-1.5 rounded-md">Connect</button>
            </div>
            <button onclick="copyInvite()" class="text-[9px] font-black uppercase text-gray-500 hover:text-white transition">Copy Link</button>
        </div>
    </header>

    <main class="flex flex-grow overflow-hidden">
        
        <aside class="w-72 ops-glass border-r border-gray-800 flex flex-col overflow-hidden">
            <div class="p-5 border-b border-gray-800">
                <h3 class="text-[9px] font-black text-blue-500 uppercase tracking-widest mb-4">Hardware Console</h3>
                <select id="video-source" class="w-full bg-gray-900 border border-gray-800 rounded p-2 text-[10px] text-gray-400 mb-2
